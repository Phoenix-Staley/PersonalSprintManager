<!doctype html>
<html class="min-h-full flex max-w-screen">

<head>
    <title>Personal Sprint Manager</title>
    <link type="image/png" sizes="96x96" rel="icon" href="./assets/sprint-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./index.css">
</head>

<body class="flex flex-col flex-1 bg-primary-gray">
    <header class="w-full text-center py-6 bg-mauve-to-pink opacity-80 text-3xl font-bold border-black border-b-3">
        Task Manager
        for ADHD Minds
    </header>

    <div class="p-4 m-4 flex flex-col flex-1 bg-primary-green rounded-2xl">
        <div class="overflow-x-auto shadow rounded-xl flex-1">
            <div class="flex gap-4 p-2 size-full flex-wrap" id="columnContainer"></div>
        </div>
    </div>

    <div id="addCardModal" class="fixed inset-0 hidden items-center justify-center bg-black/40">
        <div class="bg-white rounded-xl border-3 border-black shadow-lg p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Add New Task</h2>

                <button id="closeAddCardModalBtn" class="cursor-pointer text-xl font-bold">
                    X
                </button>
            </div>

            <form id="addCardForm" class="flex flex-col gap-4">
                <div>
                    <label for="cardTitleInput" class="font-semibold">Title</label>
                    <input id="cardTitleInput" name="title" type="text" required
                        class="w-full mt-1 p-2 border-2 border-gray-300 rounded-lg" />
                </div>

                <div>
                    <label for="cardDescriptionInput" class="font-semibold">Description</label>
                    <textarea id="cardDescriptionInput" name="description"
                        class="w-full mt-1 p-2 border-2 border-gray-300 rounded-lg" rows="3"></textarea>
                </div>

                <div>
                    <label for="cardTimeInput" class="font-semibold">
                        Time Required (in 15 minute blocks)
                    </label>
                    <input id="cardTimeInput" name="timeSlots" type="number" min="1" value="1" required
                        class="w-full mt-1 p-2 border-2 border-gray-300 rounded-lg" />
                </div>

                <div>
                    <p class="font-semibold mb-2">Tags</p>

                    <div id="existingTagsContainer" class="flex flex-wrap gap-2 mb-3">
                        <!-- Existing tags go here -->
                    </div>

                    <div class="flex gap-2">
                        <input id="newTagInput" type="text" placeholder="New tag"
                            class="flex-1 p-2 border-2 border-gray-300 rounded-lg" />

                        <button id="addNewTagBtn" type="button"
                            class="px-3 py-2 bg-sky-200 border-2 border-black rounded-lg cursor-pointer">
                            Add
                        </button>
                    </div>
                </div>

                <button id="createCardBtn" type="submit"
                    class="bg-sky-300 border-3 border-black rounded-xl p-3 font-bold cursor-pointer">
                    Create Task
                </button>
            </form>
        </div>
    </div>

    <div id="addColModal" class="fixed inset-0 hidden items-center justify-center bg-black/40">
        <div class="bg-white rounded-xl border-3 border-black shadow-lg p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Add New Category</h2>

                <button id="closeAddColModalBtn" class="cursor-pointer text-xl font-bold">
                    X
                </button>
            </div>

            <form id="addColForm" class="flex flex-col gap-4">
                <div>
                    <label for="colTitleInput" class="font-semibold">Category Name</label>
                    <input id="colTitleInput" name="title" type="text" required
                        class="w-full mt-1 p-2 border-2 border-gray-300 rounded-lg" />
                </div>

                <button id="submitNewColBtn" type="submit"
                    class="bg-sky-300 border-3 border-black rounded-xl p-3 font-bold cursor-pointer">
                    Create Category
                </button>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 hidden items-center justify-center bg-black/40">
        <div class="bg-white rounded-xl border-3 border-black shadow-lg p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Are you sure you want to remove this task?</h2>

                <button id="closeConfirmModalBtn" class="cursor-pointer text-xl font-bold">
                    X
                </button>
            </div>

            <form class="flex flex-row flex-auto gap-4">
                <button id="yesConfirmBtn"
                    class="bg-red-300 border-3 border-black rounded-xl p-3 font-bold cursor-pointer flex-1">Yes</button>

                <button id="noConfirmBtn"
                    class="bg-green-200 border-3 border-black rounded-xl p-3 font-bold cursor-pointer flex-1">No</button>
        </div>
    </div>

    <img id="trashcan" src="./assets/bin-closed.png" title="delete icons"
        class="fixed right-0 bottom-0 w-16 h-16 my-16 mx-20 p-2 bg-red-300 border-black border-3 rounded-2xl z-3"></img>
</body>
<script src="./index.js"></script>

</html>
