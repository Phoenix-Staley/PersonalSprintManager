<!doctype html>
<html>

<head>
    <title>Personal Sprint Manager</title>
    <link type="image/png" sizes="96x96" rel="icon" href="./assets/sprint-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="p-4 m-4">
        <div class="overflow-x-auto shadow rounded-xl border-3 border-gray-400">
            <div class="flex gap-4 p-2" id="columnContainer"></div>
        </div>
    </div>

    <div id="addCardModal" class="fixed inset-0 hidden items-center justify-center bg-black/40">
        <div class="bg-white rounded-xl border-3 border-black shadow-lg p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Add Card</h2>

                <button id="closeAddCardModalBtn" class="cursor-pointer text-xl font-bold">
                    X
                </button>
            </div>

            <form id="addCardForm" class="flex flex-col gap-4">
                <div>
                    <label for="cardTitleInput" class="font-semibold">Title</label>
                    <input id="cardTitleInput" type="text" required
                        class="w-full mt-1 p-2 border-2 border-gray-300 rounded-lg" />
                </div>

                <div>
                    <label for="cardDescriptionInput" class="font-semibold">
                        Description
                    </label>
                    <textarea id="cardDescriptionInput" class="w-full mt-1 p-2 border-2 border-gray-300 rounded-lg"
                        rows="3"></textarea>
                </div>

                <div>
                    <label for="cardTimeInput" class="font-semibold">
                        15-minute blocks
                    </label>
                    <input id="cardTimeInput" type="number" min="1" value="1" required
                        class="w-full mt-1 p-2 border-2 border-gray-300 rounded-lg" />
                </div>

                <div>
                    <p class="font-semibold mb-2">Tags</p>

                    <div id="existingTagsContainer" class="flex flex-wrap gap-2 mb-3">
                        <!-- Existing tags go here -->
                    </div>

                    <div class="flex gap-2">
                        <input id="newTagInput" type="text" placeholder="New tag"
                            class="flex-1 p-2 border-2 border-gray-300 rounded-lg" />

                        <button id="addNewTagBtn" type="button"
                            class="px-3 py-2 bg-sky-200 border-2 border-black rounded-lg cursor-pointer">
                            Add
                        </button>
                    </div>
                </div>

                <button type="submit" class="bg-sky-300 border-3 border-black rounded-xl p-3 font-bold cursor-pointer">
                    Create Card
                </button>
            </form>
        </div>
    </div>

    <div id="addColModal" class="fixed inset-0 hidden items-center justify-center bg-black/40">
        <div class="bg-white rounded-xl border-3 border-black shadow-lg p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Add Category</h2>

                <button id="closeAddColModalBtn" class="cursor-pointer text-xl font-bold">
                    X
                </button>
            </div>

            <form id="addCardForm" class="flex flex-col gap-4">
                <div>
                    <label for="colTitleInput" class="font-semibold">Category Name</label>
                    <input id="colTitleInput" type="text" required
                        class="w-full mt-1 p-2 border-2 border-gray-300 rounded-lg" />
                </div>

                <button id="submitNewColBtn" type="submit" class="bg-sky-300 border-3 border-black rounded-xl p-3 font-bold cursor-pointer">
                    Create Card
                </button>
            </form>
        </div>
    </div>

    <img id="trashcan" src="./assets/bin-closed.png" title="delete icons" class="fixed right-0 bottom-0 w-16 h-16 m-8 p-2 bg-red-300 border-black border-3 rounded-2xl zIndex-10 "></img>
</body>
<script src="./index.js"></script>

</html>
