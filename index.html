<!doctype html>
<html>

<head>
    <title>Personal Sprint Manager</title>
    <link type="image/png" sizes="96x96" rel="icon" href="./icons8-sprint-iteration-96.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="p-4 m-4">
        <div class="overflow-x-auto shadow rounded-xl border-3 border-gray-400">
            <div class="flex gap-4 p-2">
                <div class="bg-gray-200 rounded-xl p-4 flex-1 flex flex-col gap-4">
                    <div class="bg-sky-200 rounded-xl border-3 text-center border-black p-4 flex-1">
                        <h2 class="text-xl font-bold mb-2">Done</h2>
                    </div>
                    <div id="done">
                        <div
                            class="bg-white rounded-lg border-2 border-gray-300 shadow-sm p-4 text-left flex flex-col gap-2">

                            <h3 class="text-lg font-semibold">
                                Implement Login Page
                            </h3>

                            <p class="text-gray-600 text-sm mt-2">
                                Connect frontend authentication to the Spring backend.
                            </p>

                            <div class="flex justify-between mt-4 text-sm">
                                <span></span>

                                <span class="text-gray-500">
                                    2 hrs
                                </span>
                            </div>

                            <div class="flex gap-2 mt-3 flex-wrap">
                                <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">
                                    Frontend
                                </span>

                                <span class="bg-purple-100 text-purple-800 px-2 py-1 rounded text-xs">
                                    UI
                                </span>
                            </div>

                        </div>
                    </div>
                </div>
                <button class="bg-sky-200 rounded-xl text-center cursor-pointer border-3 border-black p-4 w-16">
                    <h2 class="text-xl font-bold mb-2">+</h2>
                </button>
            </div>
        </div>
    </div>
</body>
<script src="./index.js"></script>

</html>
